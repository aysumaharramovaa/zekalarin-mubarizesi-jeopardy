<!doctype html>
<html lang="az">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zəkaların mübarizəsi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-slate-900">

    <video autoplay muted loop class="fixed top-0 left-0 w-full h-full object-cover -z-20">
        <source src="Files/bayraq.mp4" type="video/mp4" />
    </video>
    <div class="fixed inset-0 bg-black/40 backdrop-blur-sm -z-10"></div>

    <header class="w-full py-6 flex justify-center items-center gap-10">
        <img src="Files/heydar-aliyev-logo.png" class="h-24 object-contain" />
        <h1 class="text-4xl font-black text-white uppercase tracking-widest drop-shadow-2xl">Zəkaların mübarizəsi</h1>
        <img src="Files/elm-tehsil-naziriyi-logo.png" class="h-24 object-contain" />
    </header>

    <div id="timer" class="hidden">0:00</div>

    <div id="categoryContainer"></div>

    <div id="questionBox" class="hidden">
        <div id="questionText"></div>
        <div id="answerText" class="hidden"></div>
        
        <div class="mt-10 flex gap-4">
            <button id="showAnswerBtn" class="bg-green-600 hover:bg-green-700 text-white px-8 py-3 rounded-full text-xl font-bold transition">Cavabı Gör</button>
            <button id="closeBoxBtn" class="bg-red-600 hover:bg-red-700 text-white px-8 py-3 rounded-full text-xl font-bold hidden transition">Bağla</button>
        </div>
    </div>

    <audio id="bg-music" src="Files/music1.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
