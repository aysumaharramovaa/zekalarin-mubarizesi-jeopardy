<!doctype html>
<html lang="az">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zəkaların mübarizəsi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/x-icon" href="Files/icon.jpg">
    
</head>
<body class="bg-slate-900 font-poppins overflow-x-hidden">

    <img 
      src="Files/bayraqf.png" 
      alt="Background" 
      class="fixed top-0 left-0 w-full h-full " 
    />

    <div class="fixed inset-0 bg-black/40 backdrop-blur-sm -z-10"></div>

    <header class="relative w-full py-6 flex justify-center items-center gap-6 sm:gap-10 z-10">
        <img src="Files/heydar-aliyev-logo.png" class="h-16 sm:h-24 object-contain" />
      <h1
          class="text-xl md:text-4xl font-bold text-blue-500 drop-shadow-[0_0_10px_white] text-center"
        >
          Zəkaların mübarizəsi II
        </h1>
        <img src="Files/elm-tehsil-naziriyi-logo.png" class="h-16 sm:h-24 object-contain" />
    </header>

    <div id="timer" class="hidden">0:00</div>

    <div id="categoryContainer" class="relative z-10"></div>

    <div id="questionBox" class="hidden fixed inset-0 z-50 flex flex-col items-center justify-center bg-black/90 p-10 text-center">
        <div id="questionText" class="text-white text-2xl sm:text-4xl font-bold mb-8 max-w-5xl"></div>
        <div id="answerText" class="hidden text-green-400 text-2xl sm:text-4xl font-bold mb-8"></div>
        
        <div class="flex gap-4">
            <button id="showAnswerBtn" class="bg-green-600 hover:bg-green-700 text-white px-8 py-3 rounded-full text-xl font-bold transition">
                Cavabı Gör
            </button>
            <button id="closeBoxBtn" class="bg-red-600 hover:bg-red-700 text-white px-8 py-3 rounded-full text-xl font-bold hidden transition">
                Bağla
            </button>
        </div>
    </div>

    <audio id="bg-music" src="Files/music1.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
