<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zəkaların mübarizəsi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="relative font-poppins overflow-x-hidden">
    <img
      src="Files/bayraqf.png"
      class="fixed top-0 left-0 w-full h-full "
    />
    <header class="w-full sticky top-0 z-50">
      <div
        class="max-w-7xl mx-auto flex items-center justify-center gap-6 py-4"
      >
        <img
          src="Files/heydar-aliyev-logo.png"
          class="h-16 md:h-24 object-contain"
        />
        <h1
          class="text-xl md:text-4xl font-bold text-blue-500 drop-shadow-[0_0_10px_white] text-center"
        >
          Zəkaların mübarizəsi
        </h1>
        <img
          src="Files/elm-tehsil-naziriyi-logo.png"
          class="h-16 md:h-24 object-contain"
        />
      </div>
    </header>

    <main
      id="categoryContainer"
      class="relative z-10 max-w-full mx-auto flex flex-wrap justify-center gap-6 p-10"
    ></main>

    <div
      id="timer"
      class="fixed bottom-10 left-1/2 -translate-x-1/2 w-40 h-20 flex items-center justify-center text-5xl font-bold bg-black/80 text-white rounded-2xl border-2 border-blue-500 z-[60] hidden shadow-2xl"
    >
      00:00
    </div>

    <div
      id="questionBox"
      class="hidden fixed inset-0 flex flex-col items-center justify-center text-center px-10 md:px-20 text-white bg-black/95 z-[100]"
    >
      <div
        id="questionText"
        class="text-2xl md:text-4xl font-bold mb-10 whitespace-pre-line leading-relaxed"
      ></div>

      <div
        id="answerText"
        class="hidden text-3xl md:text-6xl text-yellow-400 font-extrabold mb-10 p-6 border-y-4 border-yellow-500 bg-yellow-500/10 rounded-xl"
      ></div>

      <div class="flex gap-4">
        <button
          id="showAnswerBtn"
          class="px-10 py-4 bg-green-600 hover:bg-green-500 text-white rounded-2xl text-2xl font-bold transition-all shadow-xl active:scale-95"
        >
          Cavabı Göstər
        </button>
        <button
          id="closeBoxBtn"
          class="hidden px-10 py-4 bg-red-600 hover:bg-red-500 text-white rounded-2xl text-2xl font-bold transition-all shadow-xl active:scale-95"
        >
          Bağla
        </button>
      </div>
    </div>

    <audio id="background-music" src="Files/music1.mp3"></audio>

    <script src="script.js"></script>
  </body>
</html>
