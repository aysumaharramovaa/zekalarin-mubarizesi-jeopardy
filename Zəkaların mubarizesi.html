<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bal Seçimi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="">
      <div
        class="max-w-7xl mx-auto flex items-center justify-center gap-6 py-4"
      >
        <div class="flex items-center gap-3 flex-nowrap">
          <img
            src="Files/heydar-aliyev-logo.png"
            alt="Logo 1"
            class="h-16 sm:h-20 md:h-24 lg:h-28 object-contain shrink-0"
          />

          <a
            href="/"
            class="text-xs sm:text-sm md:text-xl lg:text-3xl font-bold bg-gradient-to-r from-blue-400 to-blue-600 text-transparent bg-clip-text whitespace-nowrap"
          >
            Zəkaların mübarizəsi
          </a>

          <img
            src="Files/elm-tehsil-naziriyi-logo.png"
            alt="Logo 2"
            class="h-16 sm:h-20 md:h-24 lg:h-28 object-contain shrink-0"
          />
        </div>
      </div>
    </header>

    <div id="timer"></div>

    <audio id="background-music" src="Files/music1.mp3"></audio>

    <div class="container" id="categoryContainer"></div>

    <img
      id="fullscreen-img"
      class="fullscreen-image"
      src=""
      alt="Selected Image"
      onclick="hideImage()"
    />

    <script src="script.js"></script>
  </body>
</html>
