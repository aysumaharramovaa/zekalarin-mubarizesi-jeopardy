<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zəkaların mübarizəsi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="relative font-poppins">
    <video
      autoplay
      muted
      loop
      class="fixed top-0 left-0 w-full h-full object-cover -z-20"
    >
      <source src="Files/bayraq.mp4" type="video/mp4" />
    </video>

    <div class="fixed inset-0 bg-black/30 backdrop-blur-sm -z-10"></div>

    <header class="w-full sticky top-0 z-50">
      <div
        class="max-w-7xl mx-auto flex items-center justify-center gap-6 py-4"
      >
        <div class="flex items-center gap-4 flex-nowrap">
          <img
            src="Files/heydar-aliyev-logo.png"
            alt="Logo 1"
            class="h-16 sm:h-20 md:h-24 lg:h-28 object-contain shrink-0"
          />

          <a
            href="/"
            class="text-xs sm:text-sm md:text-xl lg:text-3xl font-bold text-white drop-shadow-lg whitespace-nowrap"
          >
            Zəkaların mübarizəsi
          </a>

          <img
            src="Files/elm-tehsil-naziriyi-logo.png"
            alt="Logo 2"
            class="h-16 sm:h-20 md:h-24 lg:h-28 object-contain shrink-0"
          />
        </div>
      </div>
    </header>

    <div
      id="timer"
      class="fixed bottom-5 left-1/2 transform -translate-x-1/2 w-32 h-16 flex items-center justify-center text-4xl font-bold bg-black/70 text-white rounded-lg z-50 hidden"
    ></div>

    <div
      id="categoryContainer"
      class="relative z-50 max-w-9xl mx-auto flex justify-center gap-2 p-5"
    ></div>

    <img
      id="fullscreen-img"
      class="fullscreen-image fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-0 h-0 opacity-0 transition-all duration-1000 z-50"
      src=""
      alt="Selected Image"
      onclick="hideImage()"
    />

    <audio id="background-music" src="Files/music1.mp3"></audio>

    <script src="script.js"></script>
  </body>
</html>
