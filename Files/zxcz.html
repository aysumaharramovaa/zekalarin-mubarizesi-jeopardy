<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bal Seçimi</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('Files/bg.jpg') no-repeat center center fixed;
            background-size: cover;
            opacity: 0.1;
            z-index: -1;
        }

        .header img {
            width: 100%;
            height: auto;
            display: block;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .category {
            text-align: center;
        }

        .category-title {
            width: 250px;
            height: 80px;
            background-color: #007bff;
            color: white;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .button {
            display: block;
            width: 250px;
            padding: 15px;
            margin: 10px auto;
            background-color: #00D775;
            border: 1px solid black;
            border-radius: 5px;
            cursor: pointer;
            font-size: 30px;
            font-weight: bold;
            color: black;
            transition: background-color 0.2s ease-in-out;
        }

        .button:hover {
            background-color: #ff0202 !important;
        }

        .hidden-button {
            background-color: gray !important;
            color: black;
            border: 2px solid gray;
            pointer-events: none;
        }

        .selected-button {
			background-color: #007bff !important;
			color: white !important;
			border: 2px solid #0056b3 !important;
		}
        

        .fullscreen-image {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            opacity: 0;
            transition: all 1s ease-in-out;
            transform: translate(-50%, -50%);
            z-index: 3;
        }

        .fullscreen-image.show {
            width: 100vw;
            height: 100vh;
            opacity: 1;
        }

        #timer {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
            font-weight: bold;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            display: none;
            z-index: 4;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="Files/header-1.png" alt="Header Image">
    </div>

    <div id="timer"></div>
    <audio id="background-music" src="Files/music1.mp3"></audio>
    <script src="https://cdn.jsdelivr.net/npm/@tsparticles/confetti@3.0.3/tsparticles.confetti.bundle.min.js"></script>

    <div class="container" id="categoryContainer"></div>

    <img id="fullscreen-img" class="fullscreen-image" src="" alt="Selected Image" onclick="hideImage()">

    <script>
	// DÜZƏLİŞ EDİLMİŞ JAVASCRIPT

const categories = {
    "RİYAZİYYAT": { prefix: "R", questions: { "3 bal": 20, "4 bal": 35, "5 bal": 50, "6 bal": 75, "7 bal": 100 } },
    "TƏBİƏT ELMLƏRİ": { prefix: "TE", questions: { "3 bal": 30, "4 bal": 45, "5 bal": 60, "6 bal": 75, "7 bal": 90 } },
    "HUMANİTAR ELMLƏR": { prefix: "HE", questions: { "3 bal": 30, "4 bal": 45, "5 bal": 60, "6 bal": 75, "7 bal": 90 } },
    "MƏDƏNİYYƏT VƏ İNCƏSƏNƏT": { prefix: "MvəI", questions: { "3 bal": 30, "4 bal": 45, "5 bal": 60, "6 bal": 75, "7 bal": 90 } },
    "RƏQƏMSAL TEXNOLOGİYALAR": { prefix: "RT", questions: { "3 bal": 30, "4 bal": 45, "5 bal": 60, "6 bal": 75, "7 bal": 90 } }
};

const categoryContainer = document.getElementById("categoryContainer");
let selectedImage = "", selectedButton = null, timerInterval = null;
const audioTicker1 = new Audio("Files/ticker1.mp3");
const audioTicker2 = new Audio("Files/ticker2.mp3");

Object.entries(categories).forEach(([title, { prefix, questions }]) => {
    const div = document.createElement("div");
    div.classList.add("category");

    const span = document.createElement("span");
    span.className = "category-title";
    span.innerText = title;
    div.appendChild(span);

    Object.entries(questions).forEach(([label, time]) => {
        const btn = document.createElement("button");
        btn.className = "button";
        btn.innerText = label;
        btn.dataset.time = time;
        btn.dataset.status = "new";
        btn.dataset.image = `Files/Suallar/${title}/${prefix}-${label}.jpg`;
        btn.onclick = () => handleButtonClick(btn);
        div.appendChild(btn);
    });

    categoryContainer.appendChild(div);
});

function runSelectionEffect(button) {
    const rect = button.getBoundingClientRect();
    const X = (rect.left + rect.right) / 2 / window.innerWidth;
    const Y = (rect.top + rect.bottom) / 2 / window.innerHeight;

    const defaults = {
        spread: 360,
        ticks: 50,
        gravity: 1,
        decay: 0.94,
        startVelocity: 30,
        shapes: ["star"],
        colors: ["FFE400", "FFBD00", "E89400", "FFCA6C", "FDFFB8"],
        origin: { x: X, y: Y },
    };

    for (let i = 0; i < 3; i++) {
        setTimeout(() => {
            confetti({ ...defaults, particleCount: 150, scalar: 1.2 });
            confetti({ ...defaults, particleCount: 10, scalar: 0.75, shapes: ["circle"] });
        }, i * 100);
    }
}

function handleButtonClick(button) {
    if (button.dataset.status !== "new") return;

    selectedImage = button.dataset.image;
    selectedButton = button;
    button.dataset.status = "waiting";
    button.classList.add("selected-button");
    button.classList.remove("hidden-button");

    runSelectionEffect(button);
    setTimeout(() => showImage(selectedImage), 1000);
    startTimer(parseInt(button.dataset.time));
}

function showImage(src) {
    const img = document.getElementById("fullscreen-img");
    img.src = src;
    img.classList.add("show");
    document.getElementById("timer").style.display = "block";
}

function hideImage() {
    document.getElementById("fullscreen-img").classList.remove("show");
    document.getElementById("timer").style.display = "none";
    clearInterval(timerInterval);
    audioTicker1.pause();
    audioTicker2.pause();
}

function startTimer(duration) {
    let time = duration;
    const timerDisplay = document.getElementById("timer");

    audioTicker1.loop = true;
    audioTicker1.play();

    function updateTimer() {
        const min = Math.floor(time / 60);
        const sec = time % 60;
        timerDisplay.innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;

        if (time === 10) {
            audioTicker1.pause();
            audioTicker1.currentTime = 0;
            audioTicker2.loop = true;
            audioTicker2.play();
        }

        if (time <= 0) {
			clearInterval(timerInterval);
			audioTicker1.pause();
			audioTicker2.pause();
			hideImage();

			const tempBtn = selectedButton;
			selectedButton = null;
			selectedImage = "";

			if (tempBtn && tempBtn.dataset.status !== "answer") {
				tempBtn.classList.remove("selected-button");
				tempBtn.classList.add("hidden-button");
				tempBtn.disabled = true;
				tempBtn.dataset.status = "done";
			}
		}
		else {
            time--;
        }
    }

    updateTimer();
    timerInterval = setInterval(updateTimer, 1000);
}

document.addEventListener("keydown", function (event) {
    const key = event.key.toLowerCase();

    if (key === "c" && selectedButton && selectedButton.dataset.status === "waiting") {
        const answerSrc = selectedImage.replace(".jpg", "-cavab.jpg");
        showImage(answerSrc);
        selectedButton.dataset.status = "answer";
    }

    if (key === "b" && selectedButton && selectedButton.dataset.status === "answer") {
        hideImage();
        selectedButton.dataset.status = "done";
        selectedButton.classList.remove("selected-button");
        selectedButton.classList.add("hidden-button");
        selectedButton.disabled = true;
        selectedButton = null;
        selectedImage = "";
    }
});


    </script>
</body>
</html>
